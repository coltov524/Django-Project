<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Coltov Academy — Profile </title>

</head>

<link rel="stylesheet" href="{% static 'css/style.css' %}">

<body>

<header>
  <a href="/">
    <img src="{% static 'images/casa.png' %}" 
         alt="Home" 
         style="filter: brightness(0) invert(1);position: absolute; top: 20px; left: 20px; width: 50px; height: 50px;">
  </a>

  <h1>Colțov Academy</h1>

  <a href="profile">
    <img src="{% static 'images/profil.png' %}" 
         alt="Profile" 
         style="filter: brightness(0) invert(1);position: absolute; top: 20px; right: 20px; width: 50px; height: 50px;">
  </a>
</header>

<div class="container">
  <div class="card">
    <p>Username: {{ user.username }}</p>
    <p>Email: {{ user.email }}</p>

    <div class="buttons">
      <a href="{% url 'bought' %}" class="btn">Courses That I Have Bought</a>
      <a href="{% url 'selling' %}" class="btn">Courses That I Sell</a>
      <a href="{% url 'change_password' %}" class="btn">Change Password</a>
      <a href="{% url 'delete_account' %}" class="btn">Delete Account</a>
      <form method="post" action="{% url 'logout' %}">
        {% csrf_token %}
        <button type="submit" class="btn">Log Out</button>
      </form>
    </div>
  </div>
</div>


<footer>
  © 2026 Coltov Academy — All rights reserved
</footer>

</body>
</html>
